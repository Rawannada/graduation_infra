version: '3.8'

services:
  # 1. قاعدة البيانات (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - deepguard-network

  # 2. خدمة فحص الملفات (Cyber Service - Python/Flask)
  cyber-service:
    build: 
      context: ./security_node
    container_name: cyber_service_container
    ports:
      - "5000:5000"
    volumes:
      - ./backend-node/uploads:/app/uploads
    networks:
      - deepguard-network

  # 3. الباك-إند (Node.js)
  backend:
    build: 
      context: ./backend-node
    container_name: deepguard_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend-node:/app
      - /app/node_modules          # حماية المكتبات جوه الكونتينر
      - /app/dist                  # حماية ملفات الـ JavaScript المحولة
      - ./backend-node/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AI_SERVICE_URL=http://host.docker.internal:8000
    env_file:
      - ./backend-node/.env
    depends_on:
      - mongodb
      - cyber-service
    networks:
      - deepguard-network

  # 4. الفرونت-إند (React/Vite)
  front-node:
    build: 
      context: ./frontend_node
    container_name: front_node_container
    ports:
      - "5173:5173"
    volumes:
      - ./frontend_node:/app
      - /app/node_modules
    env_file:
      - ./frontend_node/.env
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - deepguard-network

networks:
  deepguard-network:
    driver: bridge

volumes:
  mongo_data: