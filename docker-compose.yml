version: '3.8'

services:

 
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    volumes:
      - mongo_data:/data/db
    networks:
      - deepguard-network

  cyber-service:
    build:
      context: ./security_node
    container_name: cyber_service_container
    volumes:
      - ./backend-node/uploads:/app/uploads
    networks:
      - deepguard-network

  backend:
    build:
      context: ./backend-node
    container_name: deepguard_backend
    volumes:
      - ./backend-node:/app
      - /app/node_modules
      - /app/dist
      - ./backend-node/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./backend-node/.env
    depends_on:
      - mongodb
      - cyber-service
    networks:
      - deepguard-network
    
    

  front-node:
    build:
      context: ./frontend_node
    container_name: front_node_container
    volumes:
      - ./frontend_node:/app
      - /app/node_modules
    env_file:
      - ./frontend_node/.env
    environment:
      - VITE_API_BASE_URL=http://localhost
    depends_on:
      - backend
    networks:
      - deepguard-network

  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend-node/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - front-node
    networks:
      - deepguard-network

networks:
  deepguard-network:
    driver: bridge

volumes:
  mongo_data: