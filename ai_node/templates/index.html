<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Insight AI</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a10; color: #fff; font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; padding-bottom: 3rem; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #111118; border-bottom: 1px solid #222230; position: sticky; top: 0; z-index: 10; }
    header strong { font-size: 1rem; }
    #status { font-size: 0.78rem; padding: 4px 10px; border-radius: 20px; background: #1e1e2e; color: #aaa; }
    #status.ok   { background: #0d2e1a; color: #4ade80; }
    #status.fail { background: #2e0d0d; color: #f87171; }
    .container { max-width: 820px; margin: 0 auto; padding: 0 16px; }
    .section { background: #11111a; border: 1px solid #1e1e2e; border-radius: 12px; padding: 18px; margin-top: 18px; }
    .section h2 { font-size: 0.9rem; font-weight: 500; color: #aaa; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    .hidden { display: none !important; }
    .drop-zone { border: 2px dashed #2a2a40; border-radius: 10px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; color: #666; font-size: 0.9rem; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #7c6aff; background: #13132a; color: #ccc; }
    .drop-zone input[type=file] { display: none; }
    .file-name { font-size: 0.82rem; color: #7c6aff; margin-top: 8px; min-height: 18px; }
    .btn { background: #7c6aff; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-family: inherit; font-weight: 500; transition: background 0.15s, opacity 0.15s; }
    .btn:hover { background: #6a58ee; }
    .btn:active { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.secondary { background: transparent; border: 1px solid #333; color: #ccc; }
    .btn.secondary:hover { background: #1a1a28; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .stat-card { background: #171724; border-radius: 8px; padding: 12px 14px; }
    .stat-card .label { font-size: 0.75rem; color: #666; margin-bottom: 4px; }
    .stat-card .value { font-size: 1.1rem; font-weight: 500; }
    .suggestion-card { background: #171724; border: 1px solid #222235; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; align-items: center; gap: 12px; }
    .suggestion-card:hover { background: #1a1a2e; }
    .suggestion-card.selected { border-color: #7c6aff; background: #13132a; }
    .chip { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; background: #23233a; color: #9d8fff; white-space: nowrap; }
    .suggestion-title { font-size: 0.875rem; flex: 1; }
    .suggestion-meta { font-size: 0.75rem; color: #555; margin-top: 2px; }
    .chart-wrap { background: #171724; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .chart-check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .chart-check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #7c6aff; cursor: pointer; }
    .chart-check-row label { font-size: 0.82rem; color: #aaa; cursor: pointer; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e1e2e; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; transition: transform 0.25s; z-index: 100; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: #f87171; color: #f87171; }
  </style>
</head>
<body>
  <header>
    <strong>CSV Insight AI</strong>
    <span id="status">...</span>
  </header>

  <div class="container">

    <div class="section">
      <h2>رفع الملف</h2>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
        <u>اختر ملف</u> أو اسحبه هنا
        <div class="file-name" id="fileName"></div>
      </div>
      <div class="btn-row">
        <button class="btn" id="uploadBtn" disabled>رفع وتنظيف</button>
      </div>
    </div>

    <div class="section hidden" id="summarySection">
      <h2>ملخص البيانات</h2>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn" id="suggestBtn">اقتراح Charts</button>
      </div>
    </div>

    <div class="section hidden" id="suggestionsSection">
      <h2 id="suggestionsTitle">الاقتراحات</h2>
      <div id="suggestionsList"></div>
      <div class="btn-row">
        <button class="btn" id="renderBtn" disabled>رسم المحدد</button>
      </div>
    </div>

    <div class="section hidden" id="chartsSection">
      <h2>الرسوم البيانية</h2>
      <div id="chartsContainer"></div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn secondary" id="downloadChartsBtn">⬇️ تحميل المحدد (ZIP)</button>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    let uid = null;
    const selected = new Set();
    const chartIcons = { bar: '📊', line: '📈', scatter: '🔵', histogram: '📉', box: '📦', pie: '🥧', heatmap: '🟥' };

    function toast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show' + (isError ? ' error' : '');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.className = '', 3000);
    }

    async function checkStatus() {
      const el = document.getElementById('status');
      try {
        const r = await fetch('/api_status');
        const d = await r.json();
        el.textContent = d.ok ? `✅ ${d.model} AI` : '❌ AI غير متصل';
        el.className = d.ok ? 'ok' : 'fail';
      } catch {
        el.textContent = '❌ خطأ';
        el.className = 'fail';
      }
    }
    checkStatus();

    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(f) {
      document.getElementById('fileName').textContent = f.name;
      uploadBtn.disabled = false;
    }

    uploadBtn.addEventListener('click', async () => {
      const f = fileInput.files[0];
      if (!f) return toast('اختر ملف أولاً', true);
      uploadBtn.disabled = true;
      uploadBtn.textContent = '...';
      try {
        const fd = new FormData();
        fd.append('file', f);
        const r = await fetch('/upload', { method: 'POST', body: fd });
        const d = await r.json();
        if (d.error) { toast(d.error, true); uploadBtn.disabled = false; uploadBtn.textContent = 'رفع وتنظيف'; return; }

        uid = d.uid;
        document.getElementById('summaryGrid').innerHTML = `
          <div class="stat-card"><div class="label">صفوف</div><div class="value">${d.rows.toLocaleString()}</div></div>
          <div class="stat-card"><div class="label">أعمدة</div><div class="value">${d.cols}</div></div>
          <div class="stat-card"><div class="label">التغيير</div><div class="value" style="font-size:0.82rem">${d.shape_change}</div></div>
          <div class="stat-card">
            <div class="label">AutoClean</div>
            <div class="value" style="font-size:0.85rem;color:${d.autoclean_status==='success'?'#4ade80':'#f87171'}">
              ${d.autoclean_status === 'success' ? '✅ نجح' : '❌ فشل'}
            </div>
          </div>`;

        document.getElementById('summarySection').classList.remove('hidden');
        document.getElementById('suggestionsSection').classList.add('hidden');
        document.getElementById('chartsSection').classList.add('hidden');
        selected.clear();
        toast('✅ تم الرفع والتنظيف');
      } catch (e) {
        toast(e.message, true);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'رفع وتنظيف';
      }
    });

    document.getElementById('suggestBtn').addEventListener('click', async () => {
      const btn = document.getElementById('suggestBtn');
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const r = await fetch('/suggest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid })
        });
        const d = await r.json();
        if (d.error) { toast(d.error, true); return; }

        selected.clear();
        window.suggestions = d.suggestions;
        document.getElementById('suggestionsTitle').textContent = d.source === 'ai' ? '🤖 اقتراحات AI' : '📊 اقتراحات تلقائية';

        const list = document.getElementById('suggestionsList');
        list.innerHTML = '';
        if (!d.suggestions || d.suggestions.length === 0) {
          list.innerHTML = '<p style="color:#666;font-size:0.85rem">لا توجد اقتراحات</p>';
        } else {
          d.suggestions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'suggestion-card';
            const icon = chartIcons[s.type] || '📊';
            const meta = [s.x ? `x: ${s.x}` : null, s.y ? `y: ${s.y}` : null].filter(Boolean).join(' • ');
            div.innerHTML = `
              <span class="chip">${icon} ${s.type}</span>
              <div>
                <div class="suggestion-title">${s.title} <small style="color:#555">#${i+1}</small></div>
                <div class="suggestion-meta">${meta}</div>
              </div>`;
            div.addEventListener('click', () => {
              if (selected.has(i)) {
                selected.delete(i);
                div.classList.remove('selected');
              } else {
                selected.add(i);
                div.classList.add('selected');
              }
              document.getElementById('renderBtn').disabled = selected.size === 0;
            });
            list.appendChild(div);
          });
        }

        document.getElementById('suggestionsSection').classList.remove('hidden');
        document.getElementById('chartsSection').classList.add('hidden');
      } catch (e) {
        toast(e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'اقتراح Charts';
      }
    });

    document.getElementById('renderBtn').addEventListener('click', async () => {
      if (selected.size === 0) return toast('اختر chart واحد على الأقل', true);

      const btn = document.getElementById('renderBtn');
      btn.disabled = true;
      btn.textContent = '...';

      const container = document.getElementById('chartsContainer');
      container.innerHTML = '';
      document.getElementById('chartsSection').classList.remove('hidden');

      const charts = [...selected].map(i => window.suggestions[i]);

      try {
        const r = await fetch('/render', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid, charts })
        });
        const d = await r.json();
        if (d.error) { toast(d.error, true); return; }

        d.charts.forEach((result, idx) => {
          const wrap = document.createElement('div');
          wrap.className = 'chart-wrap';

          if (!result || !result.success) {
            wrap.innerHTML = `<p style="color:#f87171;font-size:0.85rem">❌ ${result ? result.error : 'خطأ غير معروف'}</p>`;
            container.appendChild(wrap);
            return;
          }

          const checkRow = document.createElement('div');
          checkRow.className = 'chart-check-row';
          checkRow.innerHTML = `
            <input type="checkbox" id="chk_${idx}" checked />
            <label for="chk_${idx}">${result.title || 'Chart ' + (idx + 1)}</label>`;
          wrap.appendChild(checkRow);

          const plotDiv = document.createElement('div');
          plotDiv.style.height = '400px';
          plotDiv.dataset.chartIdx = idx;
          wrap.appendChild(plotDiv);
          container.appendChild(wrap);

          const layout = Object.assign({}, result.fig.layout, {
            paper_bgcolor: '#171724',
            plot_bgcolor: '#171724',
            font: { color: '#ccc', family: 'DM Sans' },
            margin: { t: 40, r: 16, b: 40, l: 40 },
            height: 400,
            width: container.offsetWidth - 60
          });

          Plotly.react(plotDiv, result.fig.data, layout);
        });

        toast('✅ تم الرسم');
      } catch (e) {
        toast(e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'رسم المحدد';
      }
    });

    document.getElementById('downloadChartsBtn').addEventListener('click', async () => {
      const allPlotDivs = document.querySelectorAll('#chartsContainer .chart-wrap div[data-chart-idx]');
      const toDownload = [...allPlotDivs].filter(div => {
        const chk = document.getElementById(`chk_${div.dataset.chartIdx}`);
        return chk && chk.checked;
      });

      if (toDownload.length === 0) return toast('محددتش أي chart', true);

      const btn = document.getElementById('downloadChartsBtn');
      btn.disabled = true;
      btn.textContent = '...جاري التحميل';

      try {
        const zip = new JSZip();
        const folder = zip.folder('charts');

        for (let i = 0; i < toDownload.length; i++) {
          const imgData = await Plotly.toImage(toDownload[i], {
            format: 'png',
            width: 1200,
            height: 500,
            scale: 2
          });
          folder.file(`chart_${i + 1}.png`, imgData.split(',')[1], { base64: true });
        }

        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'charts.zip';
        a.click();
        toast(`✅ تم تحميل ${toDownload.length} chart`);
      } catch (e) {
        toast(e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = '⬇️ تحميل المحدد (ZIP)';
      }
    });
  </script>
</body>
</html>
